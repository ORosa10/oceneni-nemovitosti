name: Denní aktualizace dat

on:
  push:
    branches: [main]        # první naplnění dat hned po nahrání repa
  schedule:
    - cron: "0 4 * * *"   # každý den 4:00 UTC (6:00 v létě v ČR)
  workflow_dispatch:        # + ruční spuštění tlačítkem

permissions:
  contents: write

concurrency:
  group: aktualizace-dat
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace závislostí
        run: pip install -r requirements.txt

      - name: Databáze (init při prvním běhu)
        run: python -m src.main init

      - name: Import ze Sreality (byty, Praha)
        run: python -m src.main import-sreality "https://www.sreality.cz/hledani/prodej/byty/praha" --max-stranek 60 2>&1 | tee docs/import_log.txt
        continue-on-error: true   # když Sreality změní API, publikuj aspoň stávající data

      - name: Extrakce nájemného MFČR
        run: python scripts/mfcr_najemne.py 2>&1 | tee docs/diag_log.txt
        continue-on-error: true

      - name: Dotažení detailů nabídek (stav, rok, balkon, parkování)
        run: python -m src.main import-detaily --limit 4000 2>&1 | tail -5 | tee docs/detail_log.txt
        continue-on-error: true


      - name: DIAGNOSTIKA seo/slug pole pro opravu URL nabídek (dočasné)
        run: |
          python3 -c "
import json, requests
h = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36', 'Accept': 'application/json'}
r = requests.get('https://www.sreality.cz/api/v1/estates/search', params={'category_main_cb':1,'category_type_cb':1,'locality_region_id':10,'limit':1,'offset':0}, headers=h, timeout=30)
open('docs/diag_search.txt','w',encoding='utf-8').write(json.dumps(r.json()['results'][0], ensure_ascii=False, indent=2))
r2 = requests.get('https://www.sreality.cz/api/v1/estates/1396826956', headers=h, timeout=30)
open('docs/diag_detail.txt','w',encoding='utf-8').write(json.dumps(r2.json(), ensure_ascii=False, indent=2))
print('diag OK')
"

      - name: Přepočet ocenění
        run: python -m src.main ocenit 2>&1 | tee docs/ocenit_log.txt

      - name: Statická appka do docs/
        run: python -m src.main build-static 2>&1 | tee docs/build_log.txt

      - name: Commit dat
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nemovitosti.db data/najemne_mfcr.csv docs/ 2>/dev/null || git add data/nemovitosti.db docs/
          git diff --cached --quiet || git commit -m "Denní aktualizace dat ($(date +%F))"
          git pull --rebase origin main || true
          git push
