name: Denní aktualizace dat

on:
  push:
    branches: [main]        # první naplnění dat hned po nahrání repa
  schedule:
    - cron: "0 4 * * *"   # každý den 4:00 UTC (6:00 v létě v ČR)
  workflow_dispatch:        # + ruční spuštění tlačítkem

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace závislostí
        run: pip install -r requirements.txt

      - name: Databáze (init při prvním běhu)
        run: python -m src.main init

      - name: Diagnostika Sreality API
        run: |
          {
          echo "=== test 1: v2 estates, browser UA ==="
          curl -s -o /tmp/r1 -w "HTTP %{http_code}\n" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126 Safari/537.36" -H "Accept: application/json" -H "Referer: https://www.sreality.cz/" "https://www.sreality.cz/api/cs/v2/estates?category_main_cb=1&category_type_cb=1&locality_region_id=10&per_page=2"
          head -c 300 /tmp/r1; echo
          echo "=== test 2: v2 count ==="
          curl -s -o /tmp/r2 -w "HTTP %{http_code}\n" -A "Mozilla/5.0" "https://www.sreality.cz/api/cs/v2/estates/count?category_main_cb=1&category_type_cb=1"
          head -c 300 /tmp/r2; echo
          echo "=== test 3: bez www ==="
          curl -s -o /tmp/r3 -w "HTTP %{http_code}\n" -A "Mozilla/5.0" "https://sreality.cz/api/cs/v2/estates?per_page=2"
          head -c 300 /tmp/r3; echo
          echo "=== test 4: frontend stranka ==="
          curl -s -o /tmp/r4 -w "HTTP %{http_code}\n" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126" "https://www.sreality.cz/hledani/prodej/byty/praha"
          head -c 200 /tmp/r4; echo
          } 2>&1 | tee docs/diag_log.txt
        continue-on-error: true

      - name: Import ze Sreality (byty, Praha)
        run: python -m src.main import-sreality "https://www.sreality.cz/hledani/prodej/byty/praha" --max-stranek 10 2>&1 | tee docs/import_log.txt
        continue-on-error: true   # když Sreality změní API, publikuj aspoň stávající data

      - name: Přepočet ocenění
        run: python -m src.main ocenit

      - name: Statická appka do docs/
        run: python -m src.main build-static

      - name: Commit dat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nemovitosti.db docs/
          git diff --cached --quiet || git commit -m "Denní aktualizace dat ($(date +%F))"
          git push
