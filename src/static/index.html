<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ocenění nemovitostí</title>
<style>
:root{--bg:#0f1420;--panel:#171e2e;--line:#252f45;--tx:#e8ecf4;--mut:#8b96ad;--acc:#4f8ef7;--ok:#3ecf8e;--warn:#f7b84f;--bad:#f76f6f}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--tx);font:14px/1.5 system-ui,Segoe UI,sans-serif}
header{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap}
header h1{font-size:17px}
header .sub{color:var(--mut);font-size:12px}
main{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 60px)}
aside{padding:18px;border-right:1px solid var(--line);background:var(--panel)}
aside h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin:14px 0 6px}
aside h2:first-child{margin-top:0}
select,input{width:100%;background:#0d1220;color:var(--tx);border:1px solid var(--line);border-radius:6px;padding:7px 9px;font-size:13px}
select[multiple]{height:130px}
.row2{display:flex;gap:8px}
button{cursor:pointer;border:0;border-radius:6px;padding:9px 12px;font-size:13px;font-weight:600}
.btn-p{background:var(--acc);color:#fff;width:100%;margin-top:14px}
.btn-s{background:#232c42;color:var(--tx);width:100%;margin-top:8px}
section{padding:18px 22px;overflow:auto}
.stats{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 16px}
.stat b{font-size:18px}
.stat span{display:block;color:var(--mut);font-size:11px}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
tr.l:hover{background:#1c2438;cursor:pointer}
.sleva-ok{color:var(--ok);font-weight:700}.sleva-mid{color:var(--warn);font-weight:600}.sleva-bad{color:var(--bad)}
.detail{background:#121829}
.detail td{padding:14px 16px;white-space:normal}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
.card h3{font-size:11px;color:var(--mut);text-transform:uppercase;margin-bottom:6px}
.kv{display:flex;justify-content:space-between;font-size:13px;padding:2px 0;gap:10px}
.kv span:first-child{color:var(--mut)}
a{color:var(--acc)}
.empty{color:var(--mut);padding:40px;text-align:center}
@media(max-width:800px){main{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<header>
  <h1>🏠 Ocenění nemovitostí</h1>
  <div class="sub">tržní hodnota dle tvého modelu · peer group · podhodnocené příležitosti</div>
  <div class="sub" id="gen"></div>
</header>
<main>
<aside>
  <h2>Čtvrť</h2>
  <select id="f-ctvrt" multiple></select>
  <h2>Dispozice</h2>
  <select id="f-disp" multiple></select>
  <h2>Cena (mil. Kč)</h2>
  <div class="row2"><input id="f-cmin" type="number" placeholder="od" step="0.5"><input id="f-cmax" type="number" placeholder="do" step="0.5"></div>
  <h2>Plocha (m²)</h2>
  <div class="row2"><input id="f-pmin" type="number" placeholder="od"><input id="f-pmax" type="number" placeholder="do"></div>
  <h2>Min. sleva vs. tržní (%)</h2>
  <input id="f-sleva" type="number" placeholder="např. 10" step="1">
  <h2>Min. výnos z nájmu (%)</h2>
  <input id="f-vynos" type="number" placeholder="např. 3" step="0.5">
  <h2>Bez ceny</h2>
  <label style="font-size:13px;color:var(--mut);display:flex;gap:6px;align-items:center">
    <input id="f-bezceny" type="checkbox" style="width:auto">zobrazit „cena na vyžádání"</label>
  <button class="btn-p" onclick="render()">Filtrovat</button>
  <button class="btn-s" onclick="reset()">Zrušit filtry</button>
</aside>
<section>
  <div class="stats" id="stats"></div>
  <table>
    <thead><tr>
      <th onclick="srt('sleva_pct')">Sleva ▾</th><th>Nabídka</th><th>Čtvrť</th><th>Disp.</th>
      <th onclick="srt('plocha_m2')">m²</th><th onclick="srt('cena_czk')">Cena</th>
      <th onclick="srt('cena_m2')">Kč/m²</th><th onclick="srt('trzni_hodnota')">Tržní hodnota</th>
      <th onclick="srt('prosty_vynos_pct')">Výnos</th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table>
</section>
</main>
<script>
let ALL=[], MAPA={}, view=[], sortKey='sleva_pct', sortAsc=false;
const fmt=n=>n==null?'–':Math.round(n).toLocaleString('cs-CZ');
const pct=n=>n==null?'–':n.toLocaleString('cs-CZ',{maximumFractionDigits:1})+' %';

async function boot(){
  const d=await (await fetch('data.json',{cache:'no-store'})).json();
  ALL=d.listings; d.price_map.forEach(p=>MAPA[p.ctvrt]=p);
  document.getElementById('gen').textContent='data: '+(d.generated||'').replace('T',' ');
  const cts={}; ALL.forEach(r=>{if(r.ctvrt)cts[r.ctvrt]=(cts[r.ctvrt]||0)+1});
  document.getElementById('f-ctvrt').innerHTML=Object.keys(cts).sort().map(c=>`<option value="${c}">${c} (${cts[c]})</option>`).join('');
  const ds=[...new Set(ALL.map(r=>r.dispozice).filter(Boolean))].sort();
  document.getElementById('f-disp').innerHTML=ds.map(d=>`<option>${d}</option>`).join('');
  render();
}
const vals=id=>[...document.getElementById(id).selectedOptions].map(o=>o.value);
const num=id=>{const v=document.getElementById(id).value;return v===''?null:+v;};
function srt(k){if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=(k==='cena_czk');}render();}
function reset(){document.querySelectorAll('aside select,aside input').forEach(e=>{if(e.type==='checkbox')e.checked=false;else e.value='';if(e.multiple)[...e.options].forEach(o=>o.selected=false)});render();}

function render(){
  const ct=vals('f-ctvrt'), dp=vals('f-disp');
  const cmin=num('f-cmin'), cmax=num('f-cmax'), pmin=num('f-pmin'), pmax=num('f-pmax'),
        msl=num('f-sleva'), mvy=num('f-vynos');
  const bez=document.getElementById('f-bezceny').checked;
  view=ALL.filter(r=>
    (bez||r.cena_czk!=null) &&
    (!ct.length||ct.includes(r.ctvrt)) && (!dp.length||dp.includes(r.dispozice)) &&
    (cmin==null||r.cena_czk>=cmin*1e6) && (cmax==null||r.cena_czk<=cmax*1e6) &&
    (pmin==null||r.plocha_m2>=pmin) && (pmax==null||r.plocha_m2<=pmax) &&
    (msl==null||(r.sleva_pct!=null&&r.sleva_pct>=msl)) &&
    (mvy==null||(r.prosty_vynos_pct!=null&&r.prosty_vynos_pct>=mvy)));
  view.sort((a,b)=>{const x=a[sortKey],y=b[sortKey];
    if(x==null)return 1; if(y==null)return -1; return sortAsc?x-y:y-x;});
  const tb=document.getElementById('tb');
  if(!view.length){tb.innerHTML='<tr><td colspan="9" class="empty">Žádné nabídky — počkej na první běh importu, nebo uvolni filtry.</td></tr>';}
  else tb.innerHTML=view.map((r,i)=>{
    const cls=r.sleva_pct>=15?'sleva-ok':r.sleva_pct>=5?'sleva-mid':'sleva-bad';
    return `<tr class="l" onclick="detail(${i},this)">
      <td class="${cls}">${pct(r.sleva_pct)}</td>
      <td>${r.nazev||''}</td><td>${r.ctvrt||''}</td><td>${r.dispozice||''}</td>
      <td>${r.plocha_m2||''}</td><td>${r.cena_czk==null?'na vyžádání':fmt(r.cena_czk)}</td><td>${fmt(r.cena_m2)}</td>
      <td>${fmt(r.trzni_hodnota)}</td><td>${pct(r.prosty_vynos_pct)}</td></tr>`;
  }).join('');
  const se=view.filter(r=>r.sleva_pct!=null);
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><b>${view.length}</b><span>nabídek</span></div>
     <div class="stat"><b>${se.filter(r=>r.sleva_pct>=10).length}</b><span>příležitostí (sleva ≥ 10 %)</span></div>
     <div class="stat"><b>${pct(avg(se.map(r=>r.sleva_pct)))}</b><span>průměrná sleva</span></div>
     <div class="stat"><b>${fmt(avg(view.filter(r=>r.cena_m2).map(r=>r.cena_m2)))}</b><span>Ø Kč/m² (výběr)</span></div>`;
}

function detail(i,tr){
  const old=document.querySelector('.detail'); const was=old&&old.dataset.i==i;
  if(old)old.remove(); if(was)return;
  const r=view[i];
  const peers=ALL.filter(x=>x.ctvrt===r.ctvrt&&x.plocha_m2>0);
  const cm2=peers.map(x=>x.cena_czk/x.plocha_m2);
  const pm=MAPA[r.ctvrt];
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  const row=document.createElement('tr'); row.className='detail'; row.dataset.i=i;
  row.innerHTML=`<td colspan="9"><div class="grid">
    <div class="card"><h3>Ocenění modelem</h3>
      <div class="kv"><span>Koef. celkem</span><b>${r.koef_celkem??'–'}</b></div>
      <div class="kv"><span>Výsledná cena/m²</span><b>${fmt(r.vysledna_cena_m2)} Kč</b></div>
      <div class="kv"><span>Cena za byt</span><b>${fmt(r.cena_za_byt)} Kč</b></div>
      <div class="kv"><span>Příplatky</span><b>${fmt(r.priplatky_czk)} Kč</b></div>
      <div class="kv"><span>Tržní hodnota</span><b>${fmt(r.trzni_hodnota)} Kč</b></div>
      <div class="kv"><span>Rozdíl vs. cena</span><b>${pct(r.rozdil_pct)}</b></div></div>
    <div class="card"><h3>Peer group — ${r.ctvrt||'–'}</h3>
      <div class="kv"><span>Nabídek ve čtvrti</span><b>${peers.length}</b></div>
      <div class="kv"><span>Ø Kč/m² nabídky</span><b>${fmt(avg(cm2))}</b></div>
      <div class="kv"><span>Rozpětí Kč/m²</span><b>${cm2.length?fmt(Math.min(...cm2))+'–'+fmt(Math.max(...cm2)):'–'}</b></div>
      <div class="kv"><span>Cenová mapa Kč/m²</span><b>${pm?fmt(pm.cena_za_m2_czk):'–'}</b></div>
      <div class="kv"><span>Transakcí v mapě</span><b>${pm?pm.pocet_transakci:'–'}</b></div></div>
    <div class="card"><h3>Nájem &amp; výnos</h3>
      <div class="kv"><span>Roční nájem (10/12)</span><b>${fmt(r.najem_rocni)} Kč</b></div>
      <div class="kv"><span>Prostý výnos</span><b>${pct(r.prosty_vynos_pct)}</b></div>
      <div class="kv"><span>Celkový výnos 20 let (IRR)</span><b>${pct(r.celkovy_vynos_pct)}</b></div></div>
    <div class="card"><h3>Hypotéka (LTV 80 %, 4,2 %, 30 let)</h3>
      <div class="kv"><span>Měsíční splátka</span><b>${fmt(r.splatka_mesicni)} Kč</b></div>
      <div class="kv"><span>Měsíční nájem</span><b>${fmt(r.najem_mesicni)} Kč</b></div>
      <div class="kv"><span>Pokrytí splátky nájmem</span><b>${pct(r.pokryti_splatky_pct)}</b></div></div>
    <div class="card"><h3>Vstupy</h3>
      <div class="kv"><span>Stav</span><b>${r.stav||'–'}</b></div>
      <div class="kv"><span>Rok výstavby</span><b>${r.rok_vystavby||'–'}</b></div>
      <div class="kv"><span>Balkon / parkování</span><b>${r.balkon||'–'} / ${r.parkovani||'–'}</b></div>
      <div class="kv"><span>Lokalita (skóre ${r.lokalita_skore??'–'})</span><b>${(r.lokalita||r.lokalita_auto||'–').split(',')[0]}</b></div>
      ${r.lokalita_detail?`<div class="kv" style="font-size:11px;color:var(--mut)">${r.lokalita_detail}</div>`:''}
      <div class="kv"><span>Zdroj</span><b>${r.source||'–'}</b></div>
      ${r.url?`<div class="kv"><span>Odkaz</span><a href="${r.url}" target="_blank">otevřít inzerát</a></div>`:''}</div>
  </div></td>`;
  tr.after(row);
}
boot();
</script>
</body>
</html>
